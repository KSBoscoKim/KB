<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="clk()">onclick</button>
    <button id="listener">eventListener</button>
    <script>
      const clk = () => {
        const today = new Date();
        console.log(today);
      };

      const btn = document.querySelector('#listener');
      btn.addEventListener('click', clk);
    </script>
  </body>
</html>
