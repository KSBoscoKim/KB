<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1 v-text="message"></h1>
      <h1>{{message}}</h1>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            message: 'Hello, Vue2 World!',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
