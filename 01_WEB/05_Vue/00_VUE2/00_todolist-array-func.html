<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .completed {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <!-- body 태그 안 div id가 app인 친구가 templete(가짜 div?? 여러 component에서 block으로 묶어주는) -->
    <div id="app">
      할 일 <input type="text" v-model="todoText" />
      <button v-on:click="addTodo">추가</button>
      <h2>할 일 목록</h2>
      <ul>
        <li
          v-for="(todo, index) in todolist"
          v-bind:key="todo.id"
          v-bind:class="todo.completed ? 'completed' : ''"
          v-on:click="toggleCompleted(todo.id)"
        >
          {{todo.text}}
          <button v-on:click.stop="deleteTodo(todo.id)">삭제</button>
        </li>
      </ul>
    </div>
    <script>
      const now = new Date().getTime();

      Vue.createApp({
        name: 'TodoList',
        data() {
          return {
            todolist: [
              { id: now, text: '자전거 타기', completed: false },
              { id: now + 1, text: '반장 선거', completed: false },
              { id: now + 2, text: '유세 하기', completed: false },
              { id: now + 3, text: '투표 하기', completed: false },
            ],
            todoText: '',
          };
        },

        methods: {
          addTodo() {
            this.todolist.push({
              id: new Date().getTime(),
              text: this.todoText,
              completed: false,
            });

            this.todoText = '';
          },

          deleteTodo(id) {
            // 배열함수 filter: 조건에 맞는 놈만 남김
            this.todolist = this.todolist.filter(function (item) {
              return id !== item.id;
            });
          },

          toggleCompleted(id) {
            // 배열함수 find: 조건에 맞는 첫번째만 리턴
            const target = this.todolist.find((item) => {
              return id === item.id;
            });

            if (target) target.completed = !target.completed;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
