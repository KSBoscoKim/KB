<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>논리적 그룹핑 충족 화면</title>
    <link rel="stylesheet" href="step1.css" />
  </head>
  <body>
    <div class="slide">
      <h1 class="title good">논리적 그룹핑이 충족된 화면</h1>
      <div class="form-box">
        <div>
          <p>상품 정보</p>
          <div class="field">
            <label>상품 옵션</label>
            <select>
              <option>옵션 선택</option>
            </select>
          </div>

          <div class="field">
            <label>수량</label>
            <input type="number" value="1" />
          </div>
        </div>

        <div>
          <p>배송 정보</p>
          <div class="field">
            <label>받는 사람</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>연락처</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>배송 메시지</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>배송 주소</label>
            <input type="text" />
          </div>
        </div>

        <div>
          <p>결제 정보</p>
          <div class="field">
            <label>결제 수단</label>
            <div class="radio-group">
              <label><input type="radio" name="pay" /> 카드</label>
              <label><input type="radio" name="pay" /> 간편결제</label>
            </div>
          </div>

          <div class="field">
            <label>쿠폰 코드</label>
            <input type="text" placeholder="쿠폰 입력" />
          </div>

          <div class="field">
            <label>포인트 사용</label>
            <input type="text" placeholder="사용할 포인트 입력" />
          </div>
        </div>

        <div class="button-group">
          <button class="green">결제하기</button>
        </div>
      </div>
    </div>
  </body>
</html>
