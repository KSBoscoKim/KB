<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        overflow: hidden;
        display: flex;
        justify-content: center;
      }

      li {
        list-style: none;
        padding: 15px;
        flex-shrink: 1;
      }

      li:nth-child(2n + 1) {
        background-color: orange;
      }

      li:nth-child(2n) {
        background-color: aqua;
      }

      li:first-child {
        border-radius: 15px 0 0 15px;
      }

      li:last-child {
        border-radius: 0 15px 15px 0;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>첫 번째</li>
      <li>두 번째</li>
      <li>세 번째</li>
      <li>네 번째</li>
      <li>다섯 번째</li>
      <li>여섯 번째</li>
      <li>일곱 번째</li>
    </ul>
  </body>
</html>
